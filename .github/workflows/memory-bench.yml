name: Memory bench

# Runs the memory benchmark harness (#1043).
#
# Triggers:
#   - workflow_dispatch     manual, with optional subset + dataset inputs
#   - pull_request          ONLY when memory-relevant paths change:
#                             apps/api/src/memory/**
#                             apps/api/bench/**
#                             apps/api/src/personality/system-prompt.ts
#                             apps/api/src/pipeline/core-prompt.ts
#                             packages/db/src/schema.ts
#                             packages/db/drizzle/**
#                           Skipping unrelated PRs keeps the bill predictable.
#
# Defaults: --subset=medium, --dataset=both. Models default to Sonnet for
# extraction + answerer and Opus for the judge (see apps/api/bench/src/models.ts).
#
# Costs: ~$3–7 per run on the medium subset (≈300 questions), Opus judge.
#
# Required secrets:
#   - NEON_API_KEY            ephemeral Neon branch for DB isolation
#   - NEON_PROJECT_ID         the Aura project on Neon
#   - AI_GATEWAY_API_KEY      Sonnet/Opus calls via Vercel AI Gateway
#   - COHERE_API_KEY          reranker (optional but recommended)
#
# Initial deployment is WARN-ONLY: regressions surface in the PR comment
# but don't fail the check. Flip STRICT_REGRESSION_GATE to "true" below
# once a noise floor is known. The `override-bench` label lets a PR merge
# through a justified regression.

on:
  workflow_dispatch:
    inputs:
      subset:
        description: "Subset size (fast | medium | full)"
        type: choice
        options: [fast, medium, full]
        default: medium
      dataset:
        description: "Dataset (toy | lme | locomo | both)"
        type: choice
        options: [toy, lme, locomo, both]
        default: both
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "apps/api/src/memory/**"
      - "apps/api/bench/**"
      - "apps/api/src/personality/system-prompt.ts"
      - "apps/api/src/pipeline/core-prompt.ts"
      - "apps/api/src/scripts/bench-memory.ts"
      - "packages/db/src/schema.ts"
      - "packages/db/drizzle/**"

permissions:
  contents: read
  pull-requests: write

env:
  STRICT_REGRESSION_GATE: "false"
  REGRESSION_THRESHOLD_PP: "2"

jobs:
  bench:
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Cache corpus
        uses: actions/cache@v4
        with:
          path: apps/api/bench/corpus/cache
          # Bust the cache when the manifest changes — that's our source of
          # truth for which URLs to fetch.
          key: bench-corpus-${{ hashFiles('apps/api/bench/corpus/manifest.json') }}
          restore-keys: |
            bench-corpus-

      - name: Fetch corpus (cached)
        run: pnpm --filter aura-api bench:fetch-corpus

      - name: Create ephemeral Neon branch
        id: neon
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${NEON_API_KEY:-}" ] || [ -z "${NEON_PROJECT_ID:-}" ]; then
            echo "neon-skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::NEON_API_KEY or NEON_PROJECT_ID missing — bench will skip."
            exit 0
          fi
          BRANCH="bench-${{ github.event.pull_request.number || github.run_id }}"
          RESPONSE=$(curl -sS -X POST \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches" \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"branch\":{\"name\":\"${BRANCH}\"},\"endpoints\":[{\"type\":\"read_write\"}]}")
          DB_URL=$(echo "$RESPONSE" | jq -r '.connection_uris[0].connection_uri')
          BRANCH_ID=$(echo "$RESPONSE" | jq -r '.branch.id')
          if [ "$DB_URL" = "null" ] || [ -z "$DB_URL" ]; then
            echo "Failed to create Neon branch. Response was:"
            echo "$RESPONSE"
            exit 1
          fi
          echo "::add-mask::$DB_URL"
          echo "db-url=$DB_URL" >> "$GITHUB_OUTPUT"
          echo "branch-id=$BRANCH_ID" >> "$GITHUB_OUTPUT"

      - name: Bail if Neon unavailable
        if: steps.neon.outputs.neon-skip == 'true'
        run: |
          echo "Skipping bench — no Neon credentials." >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Migrate the Neon branch
        if: steps.neon.outputs.neon-skip != 'true'
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db-url }}
        run: pnpm --filter @aura/db db:migrate

      - name: Run bench
        if: steps.neon.outputs.neon-skip != 'true'
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db-url }}
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          ELEVENLABS_API_KEY: placeholder
          DEFAULT_WORKSPACE_ID: bench-ci
          DASHBOARD_API_SECRET: placeholder
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # Model tiers — read by the bench at runtime via the live model
          # catalog. main = Sonnet-class today, escalation = Opus-class.
          AURA_BENCH_EXTRACTION: main
          AURA_BENCH_ANSWERER: main
          AURA_BENCH_JUDGE: escalation
          SUBSET: ${{ github.event.inputs.subset || 'medium' }}
          DATASET: ${{ github.event.inputs.dataset || 'both' }}
        run: |
          mkdir -p /tmp/bench
          pnpm --filter aura-api bench:memory \
            --dataset=${DATASET} \
            --subset=${SUBSET} \
            --concurrency=4 \
            --json=/tmp/bench/result.json \
            | tee /tmp/bench/output.txt
        continue-on-error: true

      - name: Upload bench artefacts
        if: steps.neon.outputs.neon-skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: memory-bench-${{ github.run_id }}
          path: |
            /tmp/bench/result.json
            /tmp/bench/output.txt
          retention-days: 30

      - name: Build sticky PR comment
        if: steps.neon.outputs.neon-skip != 'true' && github.event_name == 'pull_request'
        id: comment
        run: |
          if [ ! -f /tmp/bench/output.txt ]; then
            echo "No bench output produced." > /tmp/bench/output.txt
          fi
          {
            echo "body<<EOF"
            echo "### Memory bench (\`${SUBSET}\` subset, \`${DATASET}\`)"
            echo ""
            echo "Run: \`${{ github.run_id }}\` · commit \`${GITHUB_SHA::7}\`"
            echo ""
            echo '```'
            cat /tmp/bench/output.txt
            echo '```'
            echo ""
            if [ "${STRICT_REGRESSION_GATE}" = "true" ]; then
              echo "_Hard-fail gate is ON — regressions >${REGRESSION_THRESHOLD_PP}pp will fail this check. Apply the \`override-bench\` label to merge anyway._"
            else
              echo "_Warn-only mode — regressions surface but don't fail the check._"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          SUBSET: ${{ github.event.inputs.subset || 'medium' }}
          DATASET: ${{ github.event.inputs.dataset || 'both' }}

      - name: Post / update PR comment
        if: steps.neon.outputs.neon-skip != 'true' && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: memory-bench
          message: ${{ steps.comment.outputs.body }}

      - name: Enforce regression gate
        if: env.STRICT_REGRESSION_GATE == 'true' && steps.neon.outputs.neon-skip != 'true' && github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'override-bench')
        env:
          THRESHOLD_PP: ${{ env.REGRESSION_THRESHOLD_PP }}
        run: |
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('/tmp/bench/result.json')) {
              console.log('No result.json — failing closed.');
              process.exit(1);
            }
            const r = JSON.parse(fs.readFileSync('/tmp/bench/result.json', 'utf8'));
            const threshold = -Number(process.env.THRESHOLD_PP) / 100;
            const regressions = Object.entries(r.deltas ?? {}).filter(([_, v]) => v?.delta != null && v.delta <= threshold);
            if (regressions.length > 0) {
              console.log('Regressions detected:');
              for (const [k, v] of regressions) console.log('  ' + k + ': ' + (v.delta * 100).toFixed(1) + 'pp');
              process.exit(1);
            }
            console.log('No regressions exceeded ' + (threshold * 100) + 'pp.');
          "

      - name: Delete Neon branch
        if: always() && steps.neon.outputs.branch-id != ''
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          BRANCH_ID: ${{ steps.neon.outputs.branch-id }}
        run: |
          curl -sS -X DELETE \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches/${BRANCH_ID}" \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            || echo "Failed to delete Neon branch (will be GC'd by Neon retention)."
