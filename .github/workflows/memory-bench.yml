name: Memory bench

# Runs the memory benchmark harness (#1043).
#
# Manual dispatch only. The bench does NOT run on pull requests — it timed out
# and was irrelevant to most PRs. Routine results now come from local runs:
#
#   pnpm bench:memory --dataset=both --subset=medium --log
#
# `--log` appends a structured entry to apps/api/bench/history.jsonl and
# regenerates apps/api/bench/README.md + the snapshot in the root README.
# Commit those alongside the code change so the repo always carries the scores
# the current codebase produces. See the `aura-memory-bench` skill.
#
# This workflow stays around for the occasional managed, isolated run from the
# Actions UI (Actions → Memory bench → Run workflow) with a fresh Neon branch —
# handy when you don't have a local DB / gateway access. It uploads the result
# JSON + stdout as an artifact; it does NOT commit anything back to the repo.
#
# Defaults: --subset=medium, --dataset=both. Models default to the catalog
# tiers main (Sonnet-class) for extraction + answerer and escalation
# (Opus-class) for the judge — see apps/api/bench/src/models.ts.
#
# Costs: ~$15–25 per run on the medium subset (~330 questions), Opus judge.
#
# Required secrets:
#   - NEON_API_KEY            ephemeral Neon branch for DB isolation
#   - NEON_PROJECT_ID         the Aura project on Neon
#   - NEON_DATABASE_URL       fallback DB url if Neon-branch creation fails
#   - AI_GATEWAY_API_KEY      Sonnet/Opus calls via Vercel AI Gateway
#   - ANTHROPIC_API_KEY       direct fallback when the gateway is down
#   - COHERE_API_KEY          reranker (optional but recommended)

on:
  workflow_dispatch:
    inputs:
      subset:
        description: "Subset size (fast | medium | full)"
        type: choice
        options: [fast, medium, full]
        default: medium
      dataset:
        description: "Dataset (toy | lme | locomo | both)"
        type: choice
        options: [toy, lme, locomo, both]
        default: both

permissions:
  contents: read

# Cancel stale runs on the same ref when a new dispatch lands.
concurrency:
  group: memory-bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # No `version:` — pnpm/action-setup reads it from the repo's
      # `packageManager` field (pnpm@10.33.0). Pinning it here too triggers
      # ERR_PNPM_BAD_PM_VERSION ("multiple versions of pnpm specified").
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Cache corpus
        uses: actions/cache@v4
        with:
          path: apps/api/bench/corpus/cache
          # Bust the cache when the manifest changes — that's our source of
          # truth for which URLs to fetch.
          key: bench-corpus-${{ hashFiles('apps/api/bench/corpus/manifest.json') }}
          restore-keys: |
            bench-corpus-

      - name: Fetch corpus (cached)
        run: pnpm --filter aura-api bench:fetch-corpus

      - name: Create ephemeral Neon branch
        id: neon
        uses: neondatabase/create-branch-action@v6
        continue-on-error: true
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch_name: memory-bench-${{ github.run_id }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Migrate bench database
        # A fresh Neon branch inherits the parent's schema; run the migrator
        # directly against the branch URL so persistRun() can write to
        # bench_runs (the root db:migrate wrapper needs a .env.local CI lacks).
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url_pooled || steps.neon.outputs.db_url || secrets.NEON_DATABASE_URL || secrets.DATABASE_URL }}
        run: pnpm --filter @aura/db db:migrate

      - name: Run bench
        env:
          # Prefer the ephemeral branch URL; fall back to a long-lived bench
          # database if the Neon API is down or the secret is missing. Either
          # way the run is isolated by workspace_id='bench-{runId}'.
          DATABASE_URL: ${{ steps.neon.outputs.db_url_pooled || steps.neon.outputs.db_url || secrets.NEON_DATABASE_URL || secrets.DATABASE_URL }}
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          ELEVENLABS_API_KEY: placeholder
          DEFAULT_WORKSPACE_ID: bench-ci
          DASHBOARD_API_SECRET: placeholder
          # Model tiers — read by the bench at runtime via the live model
          # catalog. main = Sonnet-class today, escalation = Opus-class.
          AURA_BENCH_EXTRACTION: main
          AURA_BENCH_ANSWERER: main
          AURA_BENCH_JUDGE: escalation
          SUBSET: ${{ github.event.inputs.subset || 'medium' }}
          DATASET: ${{ github.event.inputs.dataset || 'both' }}
        run: |
          mkdir -p /tmp/bench
          set -o pipefail
          pnpm --filter aura-api bench:memory \
            --dataset=${DATASET} \
            --subset=${SUBSET} \
            --concurrency=4 \
            --json=/tmp/bench/result.json \
            | tee /tmp/bench/output.txt
        continue-on-error: true

      - name: Upload bench artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: memory-bench-${{ github.run_id }}
          path: |
            /tmp/bench/result.json
            /tmp/bench/output.txt
          retention-days: 30
        continue-on-error: true

      - name: Delete Neon branch
        if: always() && steps.neon.outputs.branch_id != ''
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          BRANCH_ID: ${{ steps.neon.outputs.branch_id }}
        run: |
          curl -sS -X DELETE \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches/${BRANCH_ID}" \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            || echo "Failed to delete Neon branch (will be GC'd by retention)."
