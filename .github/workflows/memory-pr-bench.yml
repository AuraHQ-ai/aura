name: Memory PR Bench

on:
  workflow_dispatch:
    inputs:
      subset:
        description: Benchmark subset to run
        type: choice
        options: [fast, medium, full]
        default: full
      judge:
        description: Run LLM QA judge
        type: boolean
        default: true
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "apps/api/src/memory/**"
      - "apps/api/bench/**"
      - "apps/api/src/scripts/bench-memory.ts"
      - "packages/db/src/schema.ts"
      - "packages/db/drizzle/**"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  memory-bench:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.pull_request.labels.*.name, 'memory-bench-override')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      VERCEL_AI_GATEWAY_API_KEY: ${{ secrets.VERCEL_AI_GATEWAY_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
      ELEVENLABS_API_KEY: placeholder-for-api-startup
      MEMORY_BENCH_EXTRACTION_MODEL: anthropic/claude-sonnet-4.6
      MEMORY_BENCH_ANSWER_MODEL: anthropic/claude-sonnet-4.6
      MEMORY_BENCH_JUDGE_MODEL: anthropic/claude-opus-4.7
      MEMORY_BENCH_CORPUS_FILE: ${{ vars.MEMORY_BENCH_CORPUS_FILE }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Neon benchmark branch
        id: neon
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: memory-bench-${{ github.run_id }}
          api_key: ${{ env.NEON_API_KEY }}

      - name: Run memory benchmark
        id: bench
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url_with_pooler }}
          DATABASE_URL_UNPOOLED: ${{ steps.neon.outputs.db_url }}
        run: |
          pnpm --filter @aura/db build
          pnpm --filter @aura/db db:migrate
          SUBSET="${{ github.event.inputs.subset }}"
          if [ -z "$SUBSET" ]; then SUBSET="medium"; fi
          JUDGE="${{ github.event.inputs.judge || 'true' }}"
          JUDGE_ARG="--judge=$MEMORY_BENCH_JUDGE_MODEL"
          if [ "$JUDGE" = "false" ]; then JUDGE_ARG="--judge=false"; fi
          CORPUS_ARG=""
          if [ -n "$MEMORY_BENCH_CORPUS_FILE" ]; then CORPUS_ARG="--corpus-file=$MEMORY_BENCH_CORPUS_FILE"; fi
          if [ -z "$CORPUS_ARG" ]; then pnpm --filter aura-api bench:fetch-corpus; fi
          PR_ARG=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then PR_ARG="--pr-number=${{ github.event.pull_request.number }}"; fi
          pnpm --silent --filter aura-api bench:memory -- --dataset=both --subset="$SUBSET" --json "$JUDGE_ARG" --extraction-model="$MEMORY_BENCH_EXTRACTION_MODEL" --answer-model="$MEMORY_BENCH_ANSWER_MODEL" --concurrency=2 $CORPUS_ARG $PR_ARG > memory-bench.json
          node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('memory-bench.json','utf8')); const rows=r.aggregates.map(a=>`| ${a.dataset} | ${a.category} | ${a.scoreType} | ${(a.score*100).toFixed(1)}% | ${a.nCorrect}/${a.n} |`).join('\n'); fs.writeFileSync('memory-bench.md', ['<!-- memory-bench-comment -->','## Memory benchmark (warn-only)','', `Run: \`${r.runId}\``, `Corpus: \`${r.corpusHash.slice(0,12)}\``, '', '| Dataset | Category | Metric | Score | N |','|---|---|---|---:|---:|', rows || '| - | - | - | - | - |','', '> Runs only for memory-path PRs or manual dispatch. Add the `memory-bench-override` label to skip urgent changes.'].join('\n'))"

      - name: Sticky PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- memory-bench-comment -->';
            const body = fs.existsSync('memory-bench.md')
              ? fs.readFileSync('memory-bench.md', 'utf8')
              : `${marker}\n## Memory benchmark (warn-only)\n\nBenchmark did not complete; inspect the workflow logs.`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.data.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
