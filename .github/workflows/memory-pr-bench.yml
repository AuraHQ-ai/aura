# Runs only when memory pipeline code changes (not on a schedule).
# Full-quality models: Sonnet-class extraction + answer, Opus-class judge.
# Corpus is cached by manifest hash — no nightly cost when nothing changes.

name: Memory benchmark

on:
  pull_request:
    paths:
      - "apps/api/src/memory/**"
      - "apps/api/src/bench/**"
      - "packages/db/src/schema.ts"
      - "packages/db/drizzle/*bench*"
  push:
    branches: [main]
    paths:
      - "apps/api/src/memory/**"
      - "apps/api/src/bench/**"
  workflow_dispatch:
    inputs:
      subset:
        description: "Subset size (full = 100 LongMemEval Qs)"
        required: true
        default: full
        type: choice
        options:
          - full
          - fast

concurrency:
  group: memory-bench-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  memory-bench:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @aura/db
        run: pnpm --filter @aura/db build

      - name: Cache benchmark corpus
        id: corpus-cache
        uses: actions/cache@v4
        with:
          path: apps/api/src/bench/corpus/cache
          key: bench-corpus-${{ hashFiles('apps/api/src/bench/corpus/manifest.json') }}

      - name: Download and build corpus
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p apps/api/src/bench/corpus/cache
          curl -fsSL -o apps/api/src/bench/corpus/cache/longmemeval_oracle.json \
            "https://huggingface.co/datasets/xiaowu0162/longmemeval-cleaned/resolve/main/longmemeval_oracle.json"
          node apps/api/src/bench/scripts/build-longmemeval-subset.mjs \
            apps/api/src/bench/corpus/cache/longmemeval_oracle.json

      - name: Run memory benchmark
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEFAULT_WORKSPACE_ID: default
          ELEVENLABS_API_KEY: placeholder
          AURA_BENCH_EXTRACTION: main
          AURA_BENCH_ANSWER: main
          AURA_BENCH_JUDGE: escalation
        run: |
          SUBSET="${{ github.event.inputs.subset || 'full' }}"
          pnpm --filter aura-api bench:memory -- \
            --dataset=lme \
            --subset="$SUBSET" \
            --judge \
            --json \
            --pr-number=${{ github.event.pull_request.number || '' }} \
            > bench-result.json

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Memory benchmark\n\n';
            body += '_Triggered because memory/bench files changed. Models: Sonnet extraction + answer, Opus judge. Not scheduled nightly._\n\n';
            try {
              const raw = fs.readFileSync('bench-result.json', 'utf8');
              const result = JSON.parse(raw);
              body += '| Dataset | Category | Metric | Score |\n|---------|----------|--------|-------|\n';
              for (const s of result.scores || []) {
                const pct = Math.round((s.score || 0) * 100);
                body += `| ${s.dataset} | ${s.category} | ${s.scoreType} | ${pct}% (${s.nCorrect}/${s.n}) |\n`;
              }
              body += `\nRun \`${result.runId}\` · models extraction=\`${result.generationModel}\` judge=\`${result.judgeModel}\`\n`;
              body += '\n> Warn-only: >2pp regression vs. your last manual baseline should be explained in the PR.\n';
            } catch (e) {
              body += '_Benchmark did not complete successfully. Check workflow logs._\n';
            }
            const marker = '<!-- memory-bench-comment -->';
            const fullBody = `${marker}\n${body}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
