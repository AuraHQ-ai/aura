name: Memory PR benchmark

on:
  pull_request:
    types: [labeled, synchronize, opened, reopened]

jobs:
  memory-bench:
    if: contains(github.event.pull_request.labels.*.name, 'memory')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @aura/db
        run: pnpm --filter @aura/db build

      - name: Run fast memory benchmark
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          DEFAULT_WORKSPACE_ID: default
          ELEVENLABS_API_KEY: placeholder
        run: |
          pnpm --filter aura-api bench:memory -- --dataset=lme --subset=fast --judge --json --pr-number=${{ github.event.pull_request.number }} > bench-result.json
        continue-on-error: true

      - name: Post PR comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            let body = '## Memory benchmark (fast subset)\n\n';
            try {
              const raw = fs.readFileSync('bench-result.json', 'utf8');
              const result = JSON.parse(raw);
              body += '| Dataset | Category | Metric | Score |\n|---------|----------|--------|-------|\n';
              for (const s of result.scores || []) {
                const pct = Math.round((s.score || 0) * 100);
                body += `| ${s.dataset} | ${s.category} | ${s.scoreType} | ${pct}% (${s.nCorrect}/${s.n}) |\n`;
              }
              body += `\nRun \`${result.runId}\` · commit \`${(result.gitSha || '').slice(0, 7)}\`\n`;
              body += '\n> Warn-only gate: regressions >2pp on any category should be explained in the PR or use label `memory-bench-override`.\n';
            } catch (e) {
              body += '_Benchmark did not complete successfully. Check workflow logs._\n';
            }
            const marker = '<!-- memory-bench-comment -->';
            const fullBody = `${marker}\n${body}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
